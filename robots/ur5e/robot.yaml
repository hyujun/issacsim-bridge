robot:
  # Paths below are relative to this pack directory (ROBOT_PACK).
  urdf_rel: urdf/ur5e.urdf
  # URDFImporter writes the asset as a directory bundle; the composed layer is nested.
  usd_rel: usd/ur5e/ur5e.usda
  # Stage location for the referenced robot — agnostic of robot name.
  prim_path: /World/Robot
  # URDF root link name. The world-anchor fixed joint (body1 == root_link) must
  # keep body0 = robot root Xform during repair_joint_chain. Required.
  root_link: base_link

joint_names:
  - shoulder_pan_joint
  - shoulder_lift_joint
  - elbow_joint
  - wrist_1_joint
  - wrist_2_joint
  - wrist_3_joint

home_pose:
  shoulder_pan_joint: 0.0
  shoulder_lift_joint: -1.5708
  elbow_joint: 1.5708
  wrist_1_joint: -1.5708
  wrist_2_joint: -1.5708
  wrist_3_joint: 0.0

drive:
  mode: position
  stiffness: 10000.0
  damping: 100.0

# Simulation loop configuration. See docs/ARCHITECTURE.md#simulation-modes.
# All fields have defaults in isaacsim_bridge/config.py — omit any to use defaults.
sim:
  # "freerun": sim steps at render_rate_hz, publishes on publish_rate_hz timer.
  # "sync":    external controller drives via /joint_command; each cmd -> one
  #            world.step() -> one /joint_states publish. Heartbeat step fires
  #            after sync_timeout_s wall-clock idle so sim-time keeps advancing.
  mode: freerun
  substeps: 4                # physics_dt = rendering_dt / substeps
  render_rate_hz: 60         # sync-mode maybe_render() wall-clock cadence
  step_rate_hz: 500          # sync-mode: rendering_dt = 1/step_rate_hz
  sync_timeout_s: 0.5        # sync-mode: wall-clock idle before heartbeat step

ros:
  joint_states_topic: /joint_states
  joint_command_topic: /joint_command
  publish_rate_hz: 100       # freerun-mode publisher timer rate
